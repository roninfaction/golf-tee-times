name = "golf-tee-times-email"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[email]
routing = [
  { pattern = "*@golfpack.app", action = "forward" }
]

[vars]
APP_WEBHOOK_URL = "https://golfpack.app/api/webhooks/email-inbound"
# WEBHOOK_SECRET is set as a Secret in Cloudflare dashboard (not here — never commit secrets)
