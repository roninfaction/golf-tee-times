<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0f172a"/>

  <!-- Club shafts (behind rim) -->
  <line x1="214" y1="193" x2="192" y2="82" stroke="#94a3b8" stroke-width="13" stroke-linecap="round"/>
  <line x1="256" y1="189" x2="256" y2="76" stroke="#94a3b8" stroke-width="13" stroke-linecap="round"/>
  <line x1="298" y1="193" x2="320" y2="82" stroke="#94a3b8" stroke-width="13" stroke-linecap="round"/>

  <!-- Bag body -->
  <rect x="154" y="193" width="204" height="228" rx="28" fill="#1e293b" stroke="#16a34a" stroke-width="6"/>

  <!-- Top rim -->
  <ellipse cx="256" cy="193" rx="102" ry="24" fill="#334155" stroke="#16a34a" stroke-width="6"/>

  <!-- Shoulder strap -->
  <path d="M 170 225 C 105 308 128 388 160 432" stroke="#16a34a" stroke-width="15" fill="none" stroke-linecap="round"/>

  <!-- Front pocket -->
  <rect x="180" y="312" width="152" height="76" rx="16" fill="#263548" stroke="#374151" stroke-width="3"/>

  <!-- Pocket zipper line -->
  <path d="M 198 349 Q 256 338 314 349" stroke="#4b5563" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Bag highlight (subtle top sheen) -->
  <ellipse cx="256" cy="193" rx="66" ry="10" fill="#475569" opacity="0.5"/>
</svg>
