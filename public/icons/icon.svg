<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0f172a"/>

  <!-- CLUBS drawn first — bag body will cover their bottoms so they appear to go inside -->

  <!-- Left shaft (angled left) -->
  <line x1="200" y1="380" x2="182" y2="78" stroke="#94a3b8" stroke-width="11" stroke-linecap="round"/>
  <!-- Left iron blade — perpendicular to shaft -->
  <line x1="164" y1="80" x2="200" y2="76" stroke="#f1f5f9" stroke-width="13" stroke-linecap="round"/>
  <!-- Left hosel dot -->
  <circle cx="182" cy="78" r="7" fill="#cbd5e1"/>

  <!-- Middle shaft (straight up) -->
  <line x1="256" y1="380" x2="256" y2="72" stroke="#94a3b8" stroke-width="11" stroke-linecap="round"/>
  <!-- Middle iron blade — horizontal -->
  <line x1="238" y1="72" x2="274" y2="72" stroke="#f1f5f9" stroke-width="13" stroke-linecap="round"/>
  <!-- Middle hosel dot -->
  <circle cx="256" cy="72" r="7" fill="#cbd5e1"/>

  <!-- Right shaft (angled right) -->
  <line x1="312" y1="380" x2="330" y2="78" stroke="#94a3b8" stroke-width="11" stroke-linecap="round"/>
  <!-- Right iron blade — perpendicular to shaft -->
  <line x1="312" y1="76" x2="348" y2="80" stroke="#f1f5f9" stroke-width="13" stroke-linecap="round"/>
  <!-- Right hosel dot -->
  <circle cx="330" cy="78" r="7" fill="#cbd5e1"/>

  <!-- BAG BODY — covers shaft bottoms to create "inside bag" illusion -->
  <rect x="150" y="196" width="212" height="222" rx="30" fill="#1e293b" stroke="#16a34a" stroke-width="5"/>

  <!-- Bag center seam (subtle depth detail) -->
  <line x1="256" y1="210" x2="256" y2="418" stroke="#243348" stroke-width="3" stroke-dasharray="8,10"/>

  <!-- Shoulder strap -->
  <path d="M 164 230 C 96 318 120 400 154 440" stroke="#15803d" stroke-width="15" fill="none" stroke-linecap="round"/>

  <!-- BAG RIM — drawn over shafts at opening to sell the "inside" effect -->
  <ellipse cx="256" cy="196" rx="106" ry="27" fill="#253547" stroke="#16a34a" stroke-width="5"/>
  <ellipse cx="256" cy="196" rx="68" ry="13" fill="#1c2e3e" opacity="0.9"/>

  <!-- GP monogram on bag -->
  <text x="256" y="288"
        text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="70"
        fill="#22c55e">GP</text>

  <!-- Front pocket -->
  <rect x="182" y="334" width="148" height="56" rx="14" fill="#243044" stroke="#334155" stroke-width="3"/>
  <!-- Pocket zip -->
  <path d="M 200 361 Q 256 351 312 361" stroke="#475569" stroke-width="3.5" fill="none" stroke-linecap="round"/>
</svg>
